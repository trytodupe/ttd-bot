services:
  postgres:
    image: postgres:17
    command: >
      postgres
      -c synchronous_commit=off
      -c checkpoint_timeout=30min
      -c max_wal_size=4GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ttd_bot}
      POSTGRES_USER: ${POSTGRES_USER:-ttd_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - ./db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ttd_bot} -d ${POSTGRES_DB:-ttd_bot}"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: always

  nonebot:
    build: .
    image: ghcr.io/trytodupe/ttd-bot:${VERSION:-latest}
    ports:
      - "8901:8901"
    environment:
      HOST: 0.0.0.0
      PORT: 8901
      VERSION: ${VERSION:-latest}
      # LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./bot.py:/app/bot.py:ro
      - ./uv.lock:/app/uv.lock:ro
      - ./data:/app/data
      - ./config:/app/config
      - ./db:/app/db
      # - /usr/share/fonts:/usr/share/fonts
      - ./.env:/app/.env:ro
      - ./clovers.toml:/app/clovers.toml:ro
      - ./fonts:/usr/share/fonts
      - ../shared:/shared # share files between dockers
    restart: always
